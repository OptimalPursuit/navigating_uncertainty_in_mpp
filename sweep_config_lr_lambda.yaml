method: bayes
metric:
  name: validation.total_profit
  goal: maximize

early_terminate:
  type: hyperband
  min_iter: 10

parameters:
  lr:
    distribution: log_uniform_values
    min: 1e-6
    max: 1e-3

  pd_lr:
    distribution: log_uniform_values
    min: 1e-6
    max: 1e-3

  feasibility_lambda:
    distribution: log_uniform_values
    min: 1e-5
    max: 1.0

  default_lagrangian_multiplier:
    distribution: log_uniform_values
    min: 1e-3
    max: 1.0
